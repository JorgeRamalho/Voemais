<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2E5C"/>
      <stop offset="50%" style="stop-color:#1A5F9E"/>
      <stop offset="100%" style="stop-color:#4A90D9"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#1A5F9E"/>
    </linearGradient>
  </defs>

  <!-- Stylized bird/plane silhouette -->
  <g transform="translate(10, 25)">
    <!-- Fuselage -->
    <ellipse cx="45" cy="35" rx="35" ry="8" fill="url(#skyGrad)"/>
    <!-- Wings -->
    <path d="M35 30 L10 10 Q25 20 35 28 Z" fill="url(#wingGrad)"/>
    <path d="M35 40 L10 60 Q25 50 35 42 Z" fill="url(#wingGrad)"/>
    <path d="M40 28 L60 5 Q55 15 45 28 Z" fill="#4A90D9"/>
    <path d="M40 42 L60 65 Q55 55 45 42 Z" fill="#4A90D9"/>
    <!-- Tail -->
    <path d="M10 30 L0 15 Q5 28 8 32 Z" fill="#1A5F9E"/>
    <path d="M10 40 L0 55 Q5 42 8 38 Z" fill="#1A5F9E"/>
    <!-- Cockpit window -->
    <ellipse cx="70" cy="35" rx="6" ry="4" fill="#E8F4FD" opacity="0.8"/>
    <!-- Motion lines -->
    <line x1="8" y1="28" x2="0" y2="25" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="35" x2="-2" y2="35" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="8" y1="42" x2="0" y2="45" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Sun/gold accent -->
    <circle cx="75" cy="20" r="6" fill="url(#goldGrad)" opacity="0.9"/>
  </g>

  <!-- Voe Mais text -->
  <text x="110" y="55" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#0A2E5C">Voe</text>
  <text x="180" y="55" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="36" font-weight="300" fill="#4A90D9">Mais</text>

  <!-- Slogan -->
  <text x="110" y="80" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="400" fill="#5A6B7C" letter-spacing="4">SUA JORNADA COMEÇA AQUI</text>

  <!-- Gold underline -->
  <rect x="110" y="88" width="50" height="3" rx="1.5" fill="url(#goldGrad)"/>
</svg>
